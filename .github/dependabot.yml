version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automerge
    commit-message:
      prefix: chore


  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:30'
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automerge
    commit-message:
      prefix: chore